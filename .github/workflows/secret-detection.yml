name: Secret Detection

on:
  workflow_call:
    inputs:
      fail-on-findings:
        description: >
          Fail the workflow when secrets are detected.
          Set to false only during initial rollout, for a fixed and
          publicly communicated period. Never set to false permanently.
        type: boolean
        default: true

jobs:
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: ${{ !inputs.fail-on-findings }}
        with:
          args: --report-format sarif --report-path gitleaks-results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-detection-results
          path: gitleaks-results.sarif
          if-no-files-found: warn
          retention-days: 7
